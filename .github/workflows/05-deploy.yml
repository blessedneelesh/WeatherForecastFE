# =============================================================
# REACT PHASE 05 — Deploy to Azure Static Web Apps
# Trigger  : workflow_call (called by 06-full-pipeline.yml)
#             OR manually via workflow_dispatch
# Goal     : Deploy build artifact to Azure Static Web Apps
#            for staging or production environment
#
# Mirrors: 07-deploy-app-service.yml (Phase 7 of .NET pipeline)
# Key difference: No Docker, no slots — SWA handles environments
#                 natively via deployment environments
#
# REQUIRED SECRETS:
#   AZURE_STATIC_WEB_APPS_TOKEN_STAGING    → SWA deployment token (staging)
#   AZURE_STATIC_WEB_APPS_TOKEN_PRODUCTION → SWA deployment token (production)
#
# REQUIRED VARIABLES:
#   REACT_APP_URL_STAGING    → https://staging.yourapp.com
#   REACT_APP_URL_PRODUCTION → https://yourapp.com
# =============================================================

name: "🌐 React Phase 05 — Deploy to Azure Static Web Apps"

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment: staging | production"
        type: string
        required: true
        default: staging
      build-artifact:
        description: "Name of the build artifact to deploy"
        type: string
        required: true
    outputs:
      deploy-url:
        value: ${{ jobs.deploy.outputs.url }}
    secrets:
      AZURE_STATIC_WEB_APPS_TOKEN_STAGING:    { required: false }
      AZURE_STATIC_WEB_APPS_TOKEN_PRODUCTION: { required: false }

  workflow_dispatch:
    inputs:
      environment:
        type: choice
        options: [staging, production]
        default: staging
      build-artifact:
        description: "Build artifact name (from Phase 04)"
        type: string
        required: true

jobs:
  deploy:
    name: "5 · Deploy → Azure SWA (${{ inputs.environment }})"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment:
      name: ${{ inputs.environment }}
      url: ${{ steps.resolve-config.outputs.app_url }}
    outputs:
      url: ${{ steps.resolve-config.outputs.app_url }}

    steps:
      # ── Resolve token + URL per environment ──────────────────
      - name: Resolve environment config
        id: resolve-config
        run: |
          if [ "${{ inputs.environment }}" = "production" ]; then
            echo "swa_token=${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN_PRODUCTION }}" >> $GITHUB_OUTPUT
            echo "app_url=${{ vars.REACT_APP_URL_PRODUCTION }}"                    >> $GITHUB_OUTPUT
          else
            echo "swa_token=${{ secrets.AZURE_STATIC_WEB_APPS_TOKEN_STAGING }}"   >> $GITHUB_OUTPUT
            echo "app_url=${{ vars.REACT_APP_URL_STAGING }}"                      >> $GITHUB_OUTPUT
          fi

      # ── Download build artifact from Phase 04 ─────────────────
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.build-artifact }}
          path: dist/

      # ── Deploy to Azure Static Web Apps ───────────────────────
      - name: Deploy to Azure Static Web Apps (${{ inputs.environment }})
        id: deploy-swa
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.resolve-config.outputs.swa_token }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/
          skip_app_build: true    # already built in Phase 04

      # ── Smoke test deployed app ────────────────────────────────
      - name: Wait for deployment to be available
        run: |
          APP_URL="${{ steps.resolve-config.outputs.app_url }}"
          echo "Polling: $APP_URL"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] || [ "$STATUS" = "302" ]; then
              echo "✅ App is available at $APP_URL"
              exit 0
            fi
            sleep 10
          done
          echo "::error::App not available after 120 seconds at $APP_URL"
          exit 1

      - name: Smoke test — root page
        run: |
          APP_URL="${{ steps.resolve-config.outputs.app_url }}"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$APP_URL")
          [ "$STATUS" = "200" ] || [ "$STATUS" = "301" ] \
            && echo "✅ Root page: HTTP $STATUS" \
            || (echo "::error::Root page failed: HTTP $STATUS" && exit 1)

      - name: Post deploy summary
        if: always()
        run: |
          echo "## 🌐 React Phase 05 — Deploy"                            >> $GITHUB_STEP_SUMMARY
          echo ""                                                          >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |"                                         >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|"                                         >> $GITHUB_STEP_SUMMARY
          echo "| Environment | \`${{ inputs.environment }}\` |"         >> $GITHUB_STEP_SUMMARY
          echo "| URL         | ${{ steps.resolve-config.outputs.app_url }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact    | \`${{ inputs.build-artifact }}\` |"      >> $GITHUB_STEP_SUMMARY
          echo "| Commit      | \`${{ github.sha }}\` |"                 >> $GITHUB_STEP_SUMMARY
          echo "| Status      | ✅ Deployed |"                           >> $GITHUB_STEP_SUMMARY
